name: threads_clone
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  hive_ce_flutter: ^2.3.4
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  image_picker: ^1.2.1
  supabase: ^2.10.4
  supabase_flutter: ^2.12.2
  flutter_dotenv: ^6.0.0
  get_it: ^9.2.1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  hive_ce_generator: ^1.1.1
  build_runner: ^2.12.2
  freezed: ^3.2.5
  json_serializable: ^6.13.0

flutter:
